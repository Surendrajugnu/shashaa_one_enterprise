{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="section-heading">
    <div>
      <h2>About Shashaa One Enterprise</h2>
      <p style="margin: 0.5rem 0 0; color: #64748b;">A demo PolicyBazaar-style insurance marketplace built with Flask.</p>
    </div>
    <a href="/quote">Calculate quote</a>
  </div>
  <div class="feature-grid">
    {% for benefit in benefits %}
      <div class="feature-card">
        <h3>{{ benefit.title }}</h3>
        <p>{{ benefit.description }}</p>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
